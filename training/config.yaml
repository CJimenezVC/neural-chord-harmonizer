# Neural Chord Harmonizer — training configuration (legacy voice-conversion path)

# Models train and run inference at 24 kHz (VCC2020's native rate). The plugin
# resamples the host stream (e.g. 48 kHz) down to 24 kHz for inference and back
# up to the host rate for output — see plugin/Source/DSP/Resampler.h.
audio:
  sample_rate: 24000
  n_fft: 512             # ~21.3 ms window @ 24 kHz
  hop_length: 128        # ~5.3 ms hop, 75% overlap
  win_length: 512
  n_mels: 128
  fmin: 20
  fmax: 8000             # well under the 12 kHz Nyquist @ 24 kHz
  f0_min: 50
  f0_max: 500

model:
  style_dim: 64
  mel_bins: 128
  encoder_channels: 256
  decoder_channels: 256
  vocoder_gru_hidden: 64
  vocoder_quant_bins: 256   # mu-law quantization

training:
  batch_size: 32
  lr: 3.0e-4
  weight_decay: 1.0e-5
  epochs: 200
  window_frames: 32         # ~680 ms windows for the encoder
  grad_clip: 5.0
  num_workers: 4
  seed: 1234
  amp: true                 # mixed precision

loss:
  recon_weight: 1.0
  vocoder_weight: 0.0    # plugin resynthesizes from mel (WaveRNN bypassed);
                         # focus training on mel reconstruction quality

data:
  features_train: ../data/datasets/preprocessed/train_features.h5
  features_eval: ../data/datasets/preprocessed/eval_features.h5
  stats: ../data/datasets/preprocessed/data_stats.json
  splits_dir: ../data/splits

paths:
  checkpoint_dir: checkpoints
  pytorch_out: ../models/pytorch
  rtneural_out: ../models/pretrained

logging:
  log_dir: runs
  log_every: 50
  eval_every: 1             # epochs
