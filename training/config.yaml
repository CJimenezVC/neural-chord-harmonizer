# Adaptive Voice Transform — training configuration

audio:
  sample_rate: 48000
  n_fft: 512
  hop_length: 128        # 75% overlap
  win_length: 512
  n_mels: 128
  fmin: 20
  fmax: 8000
  f0_min: 50
  f0_max: 500

model:
  style_dim: 64
  mel_bins: 128
  encoder_channels: 256
  decoder_channels: 256
  vocoder_gru_hidden: 64
  vocoder_quant_bins: 256   # mu-law quantization

training:
  batch_size: 32
  lr: 3.0e-4
  weight_decay: 1.0e-5
  epochs: 200
  window_frames: 32         # ~680 ms windows for the encoder
  grad_clip: 5.0
  num_workers: 4
  seed: 1234
  amp: true                 # mixed precision

loss:
  recon_weight: 1.0
  vocoder_weight: 1.0

data:
  features_train: ../data/datasets/preprocessed/train_features.h5
  features_eval: ../data/datasets/preprocessed/eval_features.h5
  stats: ../data/datasets/preprocessed/data_stats.json
  splits_dir: ../data/splits

paths:
  checkpoint_dir: checkpoints
  pytorch_out: ../models/pytorch
  rtneural_out: ../models/pretrained

logging:
  log_dir: runs
  log_every: 50
  eval_every: 1             # epochs
